<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Shop - Inscription</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div id="topbar"></div>

    <main>
        <section class="hero">
            <div class="container" style="text-align: center;">
                <span class="eyebrow">Nouveau compte</span>
                <h1 style="margin-inline: auto;">Créer un profil</h1>

                <div class="profile-card" style="text-align: left;">
                    <div id="register-message" class="message"></div>

                    <form id="register-form">
                        <div class="form-group">
                            <label for="username">Nom d'utilisateur</label>
                            <input type="text" id="username" name="username" placeholder="Ex: JeanDupont" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Adresse Email</label>
                            <input type="text" id="email" name="email" placeholder="nom@exemple.ch" required>
                        </div>

                        <div class="form-group">
                            <label for="password">Mot de passe</label>
                            <input type="password" id="password" name="password" placeholder="••••••••" required 
                                   style="width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #d1d5db; border-radius: 8px;">
                        </div>

                        <div class="form-group">
                            <label for="confirm-password">Confirmer le mot de passe</label>
                            <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required 
                                   style="width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #d1d5db; border-radius: 8px;">
                        </div>

                        <hr>

                        <div style="display: flex; flex-direction: column; gap: 1rem; align-items: center;">
                            <button type="submit" style="width: 100%;">S'inscrire</button>
                            
                            <p class="hero-text" style="font-size: 0.9rem; margin: 0;">
                                Déjà membre ? 
                                <a href="/login" style="color: var(--primary); font-weight: 600; text-decoration: none;">Connectez-vous ici</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer id="contact" class="footer">
        <div class="container">
            <p>Projet pédagogique - ETML 183</p>
        </div>
    </footer>

    <script src="/js/nav.js"></script>
</body>
</html>
