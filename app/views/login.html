<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Shop - Connexion</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <div id="topbar"></div>

    <main>
      <section class="hero">
        <div class="container" style="text-align: center;">
          <span class="eyebrow">Accès Client</span>
          <h1 style="margin-inline: auto;">Connexion</h1>
          
          <div class="profile-card" style="text-align: left;">
            
            <div id="login-message" class="message"></div>

            <form id="login-form">
              <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" name="email" placeholder="votre@email.com" required />
              </div>

              <div class="form-group">
                <label for="password">Mot de passe</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  required
                  placeholder="••••••••"
                  style="width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem;"
                />
              </div>

              <hr />

              <div style="display: flex; flex-direction: column; gap: 1rem; align-items: center;">
                <button type="submit" style="width: 100%;">Se connecter</button>
                
                <p class="hero-text" style="font-size: 0.9rem; margin: 0;">
                  Pas encore de compte ? 
                  <a href="/register" style="color: var(--primary); font-weight: 600; text-decoration: none;">Inscrivez-vous ici</a>
                </p>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer id="contact" class="footer">
      <div class="container">
        <p>Projet pédagogique - ETML 183</p>
      </div>
    </footer>

    <script src="/js/nav.js"></script>
  </body>
</html>
